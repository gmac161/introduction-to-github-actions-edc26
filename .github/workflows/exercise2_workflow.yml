name: Workflow of exercise 2
run-name: Second workflow

# Events triggering the workflow
on:
    push:
        branches: [main]
    pull_request:
        branches:
            - main
    workflow_dispatch:

# Group of jobs to run as part of the workflow
jobs:
    ubuntu_job:
        runs-on: ubuntu-latest
        steps:
            - run: echo "Hello, I'm ubuntu-latest!"
    macos_job:
        runs-on: macos-latest
        steps:
            - run: echo "Hello, I'm macos-latest!"
    slow_multistep_job:
        timeout-minutes: 1
        runs-on: ubuntu-latest
        steps:
            - name: "Introduction"
              run: echo "Hello, I'm a slow job"
            - name: "Sleepy time...zzzzZZZZ"
              run: sleep 120
    waiting_job:
        needs: slow_multistep_job
        runs-on: ubuntu-latest
        steps:
            - run: ls -l
        